<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2933;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 820px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 12px 24px rgba(31, 41, 51, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .sub {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 14px;
        }

        .status {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            min-height: 220px;
            max-height: 420px;
            overflow-y: auto;
            background: #fafafa;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 999px;
        }

        .message {
            display: flex;
            gap: 10px;
        }

        .bubble {
            padding: 10px 12px;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .bubble {
            background: #eff6ff;
            border-color: #c7ddff;
        }

        .composer {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
            min-height: 40px;
            max-height: 140px;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        button {
            background: var(--accent);
            color: #ffffff;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
        }

        .tools {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .ghost:hover {
            color: var(--text);
            border-color: #c7ddff;
        }

        @media (max-width: 600px) {
            .container {
                margin: 20px auto;
            }

            .composer {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    {% csrf_token %}
    <div class="container">
        <div class="card">
            <h1>Gemini Chat</h1>
            <p class="sub">Ask a question and get a response.</p>
            <div class="status" id="status">Ready</div>

            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="bubble">Hi. Ask me a question to get started.</div>
                </div>
            </div>

            <form id="chatForm" class="composer">
                <textarea id="messageInput" placeholder="Type your message..."></textarea>
                <button type="submit">Send</button>
            </form>

            <div class="tools">
                <button class="ghost" id="newChat" type="button">New chat</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("chatForm");
        const input = document.getElementById("messageInput");
        const messages = document.getElementById("messages");
        const statusEl = document.getElementById("status");
        const newChatBtn = document.getElementById("newChat");

        const getCookie = (name) => {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(";").shift();
            return "";
        };

        const scrollToBottom = () => {
            messages.scrollTop = messages.scrollHeight;
        };

        const addMessage = (role, text) => {
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            scrollToBottom();
            return bubble;
        };

        const setStatus = (text) => {
            statusEl.textContent = text;
        };

        const resetChat = async () => {
            messages.innerHTML = "";
            addMessage("ai", "New chat ready. Ask your next question.");
            setStatus("Reset");
            await fetch("/chat/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie("csrftoken"),
                },
                body: JSON.stringify({ reset: true }),
            });
        };

        const sendMessage = async (text) => {
            if (!text.trim()) return;
            addMessage("user", text.trim());
            input.value = "";
            input.style.height = "auto";
            setStatus("Thinking...");

            const placeholder = addMessage("ai", "...");

            try {
                const response = await fetch("/chat/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken"),
                    },
                    body: JSON.stringify({ message: text.trim() }),
                });

                const data = await response.json();
                placeholder.textContent = data.reply || data.error || "No response.";
            } catch (err) {
                placeholder.textContent = "Network error. Try again.";
            } finally {
                setStatus("Ready");
            }
        };

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            sendMessage(input.value);
        });

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage(input.value);
            }
        });

        input.addEventListener("input", () => {
            input.style.height = "auto";
            input.style.height = `${Math.min(input.scrollHeight, 140)}px`;
        });

        newChatBtn.addEventListener("click", resetChat);
    </script>
</body>
</html>
