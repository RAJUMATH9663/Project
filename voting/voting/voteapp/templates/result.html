<!DOCTYPE html>
<html>
<head>
    <title>Voting Result</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .result-box {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .candidate {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: #f1f3f6;
            border-radius: 6px;
            font-size: 16px;
        }

        .votes {
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="result-box">
    <h2>🗳️ Voting Results</h2>

    {% for c in candidates %}
        <div class="candidate">
            <span>{{ c.name }}</span>
            <span class="votes">{{ c.votes }} votes</span>
        </div>
    {% endfor %}
</div>

</body>
</html>
