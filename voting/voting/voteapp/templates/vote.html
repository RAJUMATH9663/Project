<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .vote-box {
            background: white;
            padding: 30px 40px;
            border-radius: 10px;
            width: 420px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .candidate {
            display: flex;
            align-items: center;
            background-color: #f1f3f6;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .candidate input {
            margin-right: 12px;
            transform: scale(1.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="vote-box">
    <h2>🗳️ Online Voting System</h2>

    <form method="post">
        {% csrf_token %}

        {% for c in candidates %}
            <label class="candidate">
                <input type="radio" name="candidate" value="{{ c.id }}" required>
                {{ c.name }}
            </label>
        {% endfor %}

        <button type="submit">Submit Vote</button>
    </form>
</div>

</body>
</html>
